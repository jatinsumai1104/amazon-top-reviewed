<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Amazon Top Reviewed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 420px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e7eb;
    }

    .header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid #1e1e1e;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 span { color: #f59e0b; }

    .search-row {
      display: flex;
      gap: 8px;
    }
    .search-row input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 7px;
      padding: 8px 12px;
      color: #e5e7eb;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-row input:focus { border-color: #f59e0b55; }
    .search-row input::placeholder { color: #4b5563; }

    #search-btn {
      background: #f59e0b;
      color: #000;
      border: none;
      border-radius: 7px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    #search-btn:hover { background: #d97706; }
    #search-btn:disabled { background: #2a2a2a; color: #4b5563; cursor: default; }

    #status {
      padding: 10px 18px;
      font-size: 12px;
      color: #6b7280;
      font-family: monospace;
      min-height: 34px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #1e1e1e;
    }
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid #2a2a2a;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #results { max-height: 400px; overflow-y: auto; }
    #results::-webkit-scrollbar { width: 4px; }
    #results::-webkit-scrollbar-track { background: #0f0f0f; }
    #results::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .product {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 18px;
      border-bottom: 1px solid #1a1a1a;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
    }
    .product:hover { background: #161616; }

    .rank-badge {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0;
      font-family: monospace;
      background: #1e1e1e;
      color: #4b5563;
    }
    .rank-badge.gold   { background: #f59e0b; color: #000; }
    .rank-badge.silver { background: #9ca3af; color: #000; }
    .rank-badge.bronze { background: #92400e; color: #fff; }

    .thumb {
      width: 40px; height: 40px;
      object-fit: contain;
      border-radius: 5px;
      background: #fff;
      flex-shrink: 0;
    }

    .info { flex: 1; min-width: 0; }
    .product-title {
      font-size: 12px;
      color: #d1d5db;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .product-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .stars { color: #f59e0b; font-size: 11px; letter-spacing: 1px; }
    .stars-val { font-size: 11px; color: #6b7280; }
    .review-count {
      font-size: 11px;
      color: #6b7280;
      font-family: monospace;
    }
    .review-count strong { color: #9ca3af; }
    .price { font-size: 11px; font-weight: 700; color: #34d399; }

    .empty {
      padding: 28px 18px;
      text-align: center;
      color: #4b5563;
      font-size: 13px;
    }

    .pages-note {
      padding: 8px 18px;
      font-size: 11px;
      color: #374151;
      font-family: monospace;
      border-top: 1px solid #1a1a1a;
      background: #0a0a0a;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🛒 Amazon <span>Top Reviewed</span></h1>
  <div class="search-row">
    <input id="query-input" type="text" placeholder="type c to lightning cable…" />
    <button id="search-btn">Search</button>
  </div>
</div>

<div id="status">Enter a search term above</div>
<div id="results"></div>

<script src="popup.js"></script>
</body>
</html>
